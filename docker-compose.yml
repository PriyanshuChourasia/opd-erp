services:
  postgres_db:
    image: postgres:16-alpine
    container_name: opd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-opd_db}
    # Host port 5432 is already taken by another Postgres (erp-backend-db-1)
    # Map to 5433 instead — containers talk internally via Docker DNS
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nest_user} -d ${POSTGRES_DB:-opd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: doctor-erp-api
    container_name: opd_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nest_user}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres_db:5432/${POSTGRES_DB:-opd_db}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      postgres_db:
        condition: service_healthy

volumes:
  pgdata:
